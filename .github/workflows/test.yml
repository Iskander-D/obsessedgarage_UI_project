name: Java Tests + Allure
on: [workflow_dispatch]

jobs:
  test:
    # где заускаем
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # что делаем
    steps:
      # выкачиваем репозиторий
      - uses: actions/checkout@v6
      # настраиваем java
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: Xotabu4/selenoid-github-action@v2
      # запускаем тесты1
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Run tests
        run: ./gradlew clean test "-Dselenide.remote=http://localhost:4444/wd/hub" "-DBROWSER=chrome" "-DBROWSER_VERSION=128.0" "-DBROWSER_SIZE=1920x1080" "-DPAGE_LOAD_STRATEGY=eager" "-DBASE_URL=${{ secrets.BASE_URL }}" "-DSELENOID_CREDENTIAL=${{ secrets.SELENOID_CREDENTIAL }}" "-DSELENOID_URL=${{ secrets.SELENOID_URL }}"
      # скачиваем историю тестов
      - uses: actions/checkout@v6
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
      # генерируем отчет
      - uses: simple-elf/allure-report-action@master
        if: always()
        with:
          gh_pages: gh-pages
          allure_results: build/allure-results
          allure_report: allure-report
          allure_history: allure-history
      # публикуем отчет
      - uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history